<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        
        <!-- Player Registration Form -->
        <div class="registration-form" id="registrationForm">
            <h2>Player Registration</h2>
            <div class="input-group">
                <label for="playerX">Player X Name:</label>
                <input type="text" id="playerX" placeholder="Enter Player X name" maxlength="15">
            </div>
            <div class="input-group">
                <label for="playerO">Player O Name:</label>
                <input type="text" id="playerO" placeholder="Enter Player O name" maxlength="15">
            </div>
            <button class="start-btn" id="startBtn">Start Game</button>
        </div>
        
        <!-- Game Board (hidden initially) -->
        <div class="game-container" id="gameContainer" style="display: none;">
            <div class="status" id="status">Player X's turn</div>
            <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button class="reset-btn" id="resetBtn">Reset Game</button>
        <button class="back-btn" id="backBtn">Change Players</button>
        <div class="score">
            <div class="score-item">
                <span class="score-label" id="labelX">Player X:</span>
                <span class="score-value" id="scoreX">0</span>
            </div>
            <div class="score-item">
                <span class="score-label" id="labelO">Player O:</span>
                <span class="score-value" id="scoreO">0</span>
            </div>
        </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
